<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storybook Prompt Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .dark-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

<!-- Header -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-50 py-4 px-6 shadow-sm">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <i data-lucide="book-open" class="w-6 h-6"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tight text-slate-800">Story Architect</h1>
        </div>
        <div class="flex items-center gap-2 w-full md:w-auto">
            <div class="relative w-full md:w-80">
                <i data-lucide="key" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                <input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key..." class="w-full pl-10 pr-4 py-2 bg-slate-100 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-mono">
            </div>
            <a href="https://aistudio.google.com/app/apikey" target="_blank" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                <i data-lucide="external-link" class="w-5 h-5"></i>
            </a>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto p-6 lg:p-10">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
        <!-- Form -->
        <div class="space-y-6">
            <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Language</label>
                        <select id="language" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                            <option>English</option>
                            <option>Hindi</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tone</label>
                        <select id="tone" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                            <option>Humorous & Fun</option>
                            <option>Calm Bedtime</option>
                            <option>Action Adventure</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4 border-t pt-6">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="theme" placeholder="Theme (e.g. Holi Festival)" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                        <input type="text" id="location" placeholder="Location (e.g. Riverbank)" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <textarea id="storyline" rows="3" placeholder="Describe the storyline (AI will improvise)..." class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 outline-none resize-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    <input type="text" id="conflict" placeholder="The Core Conflict" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                    <input type="text" id="moral" placeholder="The Moral Lesson" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <div class="space-y-3 border-t pt-6">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Character Cast</label>
                    <div id="characterList" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
                </div>

                <div id="errorBox" class="hidden p-3 bg-red-50 text-red-500 text-xs font-bold rounded-xl"></div>

                <button id="generateBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold text-lg shadow-lg shadow-indigo-200 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" class="w-6 h-6"></i> Generate Master Prompt
                </button>
            </div>
        </div>

        <!-- Output -->
        <div class="flex flex-col gap-6">
            <div class="bg-slate-900 text-white rounded-[2.5rem] shadow-2xl flex flex-col h-full min-h-[500px] lg:h-[calc(100vh-160px)] overflow-hidden">
                <div class="p-8 bg-slate-800/50 flex justify-between items-center border-b border-slate-800">
                    <h3 class="font-bold flex items-center gap-2">
                        <i data-lucide="message-square-quote" class="text-indigo-400"></i> Master Prompt
                    </h3>
                    <button id="copyBtn" class="hidden px-4 py-2 bg-indigo-500 hover:bg-indigo-600 rounded-xl text-xs font-bold transition-all">Copy</button>
                </div>
                <div id="output" class="flex-1 p-8 font-mono text-sm text-slate-300 whitespace-pre-wrap overflow-y-auto dark-scrollbar italic opacity-40 leading-relaxed">
                    Set your parameters and click generate to see the expanded architect prompt here...
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    const ANIMAL_ROLES = [
        { id: 'lion', name: 'Lion', trait: 'The King: Kind, smart, and the mediator.' },
        { id: 'bear', name: 'Brown Bear', trait: 'Knowledgeable but prefers napping over moving.' },
        { id: 'elephant', name: 'Elephant', trait: 'Extremely kind but moves at a snail\'s pace.' },
        { id: 'monkey', name: 'Monkey', trait: 'The source of chaos and jokes.' },
        { id: 'hippo', name: 'Hippo', trait: 'Always found sleeping in the mud.' },
        { id: 'rabbit', name: 'Rabbit', trait: 'Small, cute, and always the first to offer help.' },
        { id: 'giraffe', name: 'Giraffe', trait: 'Well-meaning but clumsy and often misunderstands simple things.' },
        { id: 'fox', name: 'Fox', trait: 'Quick-thinking and solves problems fast.' },
        { id: 'deer', name: 'Deer', trait: 'Adds grace and beauty to the scene.' },
        { id: 'birds', name: 'Birds', trait: 'Constant chatterboxes who spread news (or rumors).' }
    ];

    let selectedChars = ['lion', 'monkey', 'fox'];

    function renderCharacters() {
        const list = document.getElementById('characterList');
        list.innerHTML = ANIMAL_ROLES.map(animal => `
            <button onclick="toggleChar('${animal.id}')" class="flex items-center gap-2 p-2 rounded-lg border text-[10px] font-bold transition-all ${selectedChars.includes(animal.id) ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-slate-50 border-slate-100 text-slate-400'}">
                <div class="w-3 h-3 rounded flex items-center justify-center border ${selectedChars.includes(animal.id) ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white border-slate-300'}">
                    ${selectedChars.includes(animal.id) ? '✓' : ''}
                </div>
                ${animal.name}
            </button>
        `).join('');
    }

    window.toggleChar = (id) => {
        selectedChars = selectedChars.includes(id) ? selectedChars.filter(c => c !== id) : [...selectedChars, id];
        renderCharacters();
    }

    async function generate() {
        const key = document.getElementById('apiKeyInput').value;
        const theme = document.getElementById('theme').value;
        const errorBox = document.getElementById('errorBox');
        
        if (!key) {
            errorBox.innerText = "Please enter an API Key in the header.";
            errorBox.classList.remove('hidden');
            return;
        }
        if (!theme) {
            errorBox.innerText = "Please enter a story theme.";
            errorBox.classList.remove('hidden');
            return;
        }

        errorBox.classList.add('hidden');
        const btn = document.getElementById('generateBtn');
        const output = document.getElementById('output');
        
        btn.disabled = true;
        btn.innerHTML = `<span class="animate-spin mr-2">🌀</span> Creating...`;
        output.innerText = "Designing your master prompt...";
        output.classList.remove('opacity-40', 'italic');

        const characterDescriptions = ANIMAL_ROLES
            .filter(role => selectedChars.includes(role.id))
            .map(role => `${role.name}: ${role.trait}`)
            .join('\n');

        const userQuery = `Generate a high-quality children’s story prompt (Ages 5-10). 
        HOOK: (Improve the storyline into a 1-sentence catchy line).
        THEME: ${theme}
        LOCATION: ${document.getElementById('location').value}
        CHARACTERS: ${characterDescriptions}
        STORYLINE: ${document.getElementById('storyline').value}
        CONFLICT: ${document.getElementById('conflict').value}
        MORAL: ${document.getElementById('moral').value}
        Expand this into a master instruction for another AI.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: userQuery }] }],
                    systemInstruction: { parts: [{ text: "You are a story editor. Create a professional Master Prompt." }] }
                })
            });
            const data = await response.json();
            output.innerText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error generating content.";
            document.getElementById('copyBtn').classList.remove('hidden');
        } catch (e) {
            output.innerText = "Error: Check your key and connection.";
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="sparkles" class="w-6 h-6"></i> Generate Master Prompt`;
            lucide.createIcons();
        }
    }

    document.getElementById('generateBtn').addEventListener('click', generate);
    document.getElementById('copyBtn').addEventListener('click', () => {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text);
        const btn = document.getElementById('copyBtn');
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy", 2000);
    });

    renderCharacters();
    lucide.createIcons();
</script>
</body>
</html>
